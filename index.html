<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Importadora Cali | Catálogo de Precios</title>
        <meta name="theme-color" content="#0a0a0a">
        
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Montserrat:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
        <style>
            :root {
                --red-electric: #ff1e1e;
                --black-deep: #0a0c10;
                --black-card: #12141c;
                --white-pure: #ffffff;
                --gold-bright: #ffcc00;
                --gray-text: #94a3b8;
                --gray-border: #222533;
                --lion-orange: #ff6a00;
                --zhejiang-blue: #005eff;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Montserrat", sans-serif;
                background-color: var(--black-deep);
                color: var(--white-pure);
                padding-bottom: 60px;
                -webkit-font-smoothing: antialiased;
            }

            header {
                padding: 40px 20px 30px;
                text-align: center;
                background: linear-gradient(180deg, #12141c 0%, var(--black-deep) 100%);
                border-bottom: 4px solid var(--red-electric);
                position: relative;
            }
            
            header h1 {
                font-family: "Bebas Neue";
                font-size: clamp(2.5rem, 7vw, 4.5rem);
                letter-spacing: 4px;
                background: linear-gradient(to bottom, #fff 40%, #888 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                line-height: 1;
                margin-bottom: 5px;
            }

            header .subtitle {
                color: var(--red-electric);
                font-size: 0.9rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 4px;
                font-family: "Roboto Mono", monospace;
            }

            .controls-wrapper {
                max-width: 1100px;
                margin: 30px auto 20px;
                padding: 0 20px;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .search-box {
                background: var(--black-card);
                border: 1px solid var(--gray-border);
                border-left: 4px solid var(--red-electric);
                display: flex;
                align-items: center;
                padding: 14px 20px;
                border-radius: 4px;
                transition: border-color 0.3s;
            }
            
            .search-box:focus-within {
                border-color: var(--gray-text);
            }

            #searchInput {
                flex: 1;
                background: transparent;
                border: none;
                color: white;
                font-size: 1.1rem;
                font-family: "Montserrat", sans-serif;
                font-weight: 600;
                outline: none;
                text-transform: uppercase;
            }

            #searchInput::placeholder {
                color: #4b5563;
                font-weight: 400;
            }

            .filter-tags { 
                display: flex; 
                gap: 8px; 
                flex-wrap: wrap; 
            }

            .btn-filter {
                background: var(--black-card); 
                border: 1px solid var(--gray-border); 
                color: var(--gray-text);
                padding: 8px 18px; 
                font-family: "Montserrat", sans-serif;
                font-size: 0.85rem;
                font-weight: 700;
                text-transform: uppercase;
                border-radius: 4px;
                cursor: pointer; 
                transition: all 0.2s;
            }

            .btn-filter:hover, .btn-filter.active { 
                background: var(--white-pure); 
                color: var(--black-deep);
                border-color: var(--white-pure);
            }

            .btn-filter.btn-lion:hover, .btn-filter.btn-lion.active { background: var(--lion-orange); color: #000; border-color: var(--lion-orange); }
            .btn-filter.btn-zhejiang:hover, .btn-filter.btn-zhejiang.active { background: var(--zhejiang-blue); color: #fff; border-color: var(--zhejiang-blue); }

            /* Diseño de Lista Premium */
            .list-wrapper {
                max-width: 1100px;
                margin: 0 auto;
                padding: 0 20px;
            }

            .list-header {
                display: grid;
                grid-template-columns: 160px 1fr 140px 180px;
                padding: 15px 20px;
                background: #161925;
                border-radius: 6px 6px 0 0;
                border-bottom: 2px solid var(--gray-border);
                font-size: 0.8rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: var(--gray-text);
            }

            @media (max-width: 768px) {
                .list-header { display: none; }
            }

            .list-container {
                display: flex;
                flex-direction: column;
                gap: 2px;
                background: var(--gray-border);
                border-radius: 0 0 6px 6px;
                overflow: hidden;
            }

            .list-item {
                display: grid;
                grid-template-columns: 160px 1fr 140px 180px;
                align-items: center;
                padding: 18px 20px;
                background: var(--black-card);
                transition: background 0.2s;
            }

            .list-item:hover {
                background: #181b26;
            }

            .col-code {
                font-family: "Roboto Mono", monospace;
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--white-pure);
            }

            .col-desc {
                display: flex;
                flex-direction: column;
                gap: 4px;
                padding-right: 15px;
            }

            .product-title {
                font-size: 0.95rem;
                font-weight: 700;
                color: var(--white-pure);
                text-transform: uppercase;
            }

            .product-subcodes {
                font-family: "Roboto Mono", monospace;
                font-size: 0.75rem;
                color: var(--gray-text);
            }

            .col-brand {
                display: flex;
                align-items: center;
            }

            .brand-badge {
                display: inline-block;
                padding: 4px 10px;
                font-size: 0.75rem;
                font-weight: 700;
                border-radius: 4px;
                background: #222533;
                color: var(--white-pure);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .brand-badge.lionpower { background: rgba(255, 106, 0, 0.15); color: var(--lion-orange); border: 1px solid rgba(255, 106, 0, 0.3); }
            .brand-badge.zhejiang { background: rgba(0, 94, 255, 0.15); color: var(--zhejiang-blue); border: 1px solid rgba(0, 94, 255, 0.3); }
            .brand-badge.breiter { background: rgba(255, 30, 30, 0.15); color: var(--red-electric); border: 1px solid rgba(255, 30, 30, 0.3); }
            .brand-badge.brasil { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }

            .col-price {
                text-align: right;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .price-main {
                font-family: "Roboto Mono", monospace;
                font-size: 1.25rem;
                font-weight: 700;
                color: var(--gold-bright);
            }

            .price-fact {
                font-size: 0.75rem;
                color: var(--gray-text);
                font-weight: 600;
                margin-top: 2px;
            }

            /* Responsive para Móviles (Diseño de Fila Compacta) */
            @media (max-width: 768px) {
                .list-item {
                    grid-template-columns: 1fr;
                    gap: 12px;
                    padding: 16px;
                    border-bottom: 1px solid var(--gray-border);
                }

                .list-item-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: flex-start;
                }

                .col-code {
                    font-size: 1.1rem;
                }

                .col-price {
                    text-align: right;
                }

                .price-main {
                    font-size: 1.15rem;
                }

                .col-brand {
                    margin-top: 2px;
                }
            }

            /* Contador o estado de red */
            .catalog-footer {
                max-width: 1100px;
                margin: 20px auto;
                padding: 0 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 0.8rem;
                color: var(--gray-text);
                font-family: "Roboto Mono", monospace;
            }

            .status-offline {
                display: flex;
                align-items: center;
                gap: 6px;
                color: #22c55e;
                font-weight: 700;
            }
        </style>
    </head>
    <body>

        <header>
            <h1>IMPORTADORA CALI</h1>
            <div class="subtitle">Catálogo Digital Activo</div>
        </header>

        <div class="controls-wrapper">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass" style="color: var(--gray-text); margin-right: 15px; font-size: 1.1rem;"></i>
                <input type="text" id="searchInput" placeholder="Buscar por código, marca o descripción..." oninput="filtrar()" />
            </div>

            <div class="filter-tags" id="filterTags">
                <button class="btn-filter active" onclick="cambiarFiltro(this, '')">Todos</button>
                <button class="btn-filter btn-lion" onclick="cambiarFiltro(this, 'LIONPOWER')">Lionpower</button>
                <button class="btn-filter btn-zhejiang" onclick="cambiarFiltro(this, 'ZHEJIANG')">Zhejiang</button>
                <button class="btn-filter" onclick="cambiarFiltro(this, 'BREITER')">Breiter</button>
                <button class="btn-filter" onclick="cambiarFiltro(this, 'BRASIL')">Brasil</button>
            </div>
        </div>

        <div class="list-wrapper">
            <div class="list-header">
                <div>Código</div>
                <div>Descripción</div>
                <div>Marca</div>
                <div style="text-align: right;">Precio</div>
            </div>
            
            <div class="list-container" id="listaProductos"></div>
        </div>

        <div class="catalog-footer">
            <div id="productCount">Mostrando 0 productos</div>
            <div class="status-offline">
                <i class="fa-solid fa-circle-check"></i> Listo para usar sin internet
            </div>
        </div>

        <script>
            // Base de datos limpia y simplificada
            const productos = [
                { codCali: "B4913-C", otrosCod: "W01-M58-8098 / 4913N P02 / 1R14-753", desc: "GLOBO TRACTOR SCANIA", marca: "BREITER", pUnitario: 1250.0 },
                { codCali: "E3110", otrosCod: "3110 / 1152 / SP558829 / 1K8829CY / 9648", desc: "GLOBO TRACTO AMERICANO HOLLA PLASTICO", marca: "BRASIL", pUnitario: 1070.0 },
                { codCali: "RES 02", otrosCod: "RES 02", desc: "RESORTE CHATA GRANDE", marca: "", pUnitario: 0.0 },
                { codCali: "RES 01", otrosCod: "RES 01", desc: "RESORTE CHATA CHICO", marca: "", pUnitario: 0.0 },
                { codCali: "S 010", otrosCod: "S 010", desc: "RETÉN DE CHATA", marca: "", pUnitario: 0.0 },
                { codCali: "BR 3005", otrosCod: "BR 3005", desc: "GOMA MANO DE AMIGO DOBLE LABIO", marca: "", pUnitario: 0.0 }
            ];

            let filtroMarcaActual = "";

            function obtenerClaseMarca(marca) {
                if (!marca) return "";
                return marca.toLowerCase();
            }

            function render(data) {
                const container = document.getElementById("listaProductos");
                
                if (data.length === 0) {
                    container.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--gray-text); background: var(--black-card);">No se encontraron productos coincidentes.</div>`;
                    document.getElementById("productCount").innerText = "Mostrando 0 productos";
                    return;
                }

                // Detectar si es pantalla móvil para adaptar el DOM interno de manera limpia
                const esMovil = window.innerWidth <= 768;

                container.innerHTML = data.map(p => {
                    const unitPrice = p.pUnitario || 0;
                    const pFact = (unitPrice * 1.09).toFixed(2);
                    const marcaLabel = p.marca || "SIN MARCA";
                    const marcaClase = obtenerClaseMarca(p.marca);
                    const searchString = `${p.codCali} ${p.desc} ${p.marca} ${p.otrosCod || ''}`.toLowerCase();

                    if (esMovil) {
                        return `
                        <div class="list-item" data-search="${searchString}" data-marca="${p.marca}">
                            <div class="list-item-header">
                                <div class="col-code">${p.codCali}</div>
                                <div class="col-price">
                                    <span class="price-main">Bs ${unitPrice}</span>
                                    <span class="price-fact">FACT: Bs ${pFact}</span>
                                </div>
                            </div>
                            <div class="col-desc">
                                <span class="product-title">${p.desc}</span>
                                <span class="product-subcodes">${p.otrosCod || "---"}</span>
                            </div>
                            <div class="col-brand">
                                <span class="brand-badge ${marcaClase}">${marcaLabel}</span>
                            </div>
                        </div>`;
                    } else {
                        return `
                        <div class="list-item" data-search="${searchString}" data-marca="${p.marca}">
                            <div class="col-code">${p.codCali}</div>
                            <div class="col-desc">
                                <span class="product-title">${p.desc}</span>
                                <span class="product-subcodes">${p.otrosCod || "---"}</span>
                            </div>
                            <div class="col-brand">
                                <span class="brand-badge ${marcaClase}">${marcaLabel}</span>
                            </div>
                            <div class="col-price">
                                <span class="price-main">Bs ${unitPrice}</span>
                                <span class="price-fact">FACT: Bs ${pFact}</span>
                            </div>
                        </div>`;
                    }
                }).join("");

                document.getElementById("productCount").innerText = `Mostrando ${data.length} de ${productos.length} productos`;
            }

            function filtrar() {
                const q = document.getElementById("searchInput").value.toLowerCase();
                
                const productosFiltrados = productos.filter(p => {
                    const searchString = `${p.codCali} ${p.desc} ${p.marca} ${p.otrosCod || ''}`.toLowerCase();
                    const coincideTexto = searchString.includes(q);
                    const coincideMarca = filtroMarcaActual === "" || p.marca === filtroMarcaActual;
                    return coincideTexto && coincideMarca;
                });

                render(productosFiltrados);
            }

            function cambiarFiltro(btn, marca) {
                // Quitar clase activa a todos
                document.querySelectorAll(".btn-filter").forEach(b => b.classList.remove("active"));
                // Agregar clase activa al botón actual
                btn.classList.add("active");
                
                filtroMarcaActual = marca;
                filtrar();
            }

            // Escuchar cambios de tamaño de pantalla para re-renderizar responsivamente
            let lastWidth = window.innerWidth;
            window.addEventListener('resize', () => {
                if ((window.innerWidth <= 768 && lastWidth > 768) || (window.innerWidth > 768 && lastWidth <= 768)) {
                    lastWidth = window.innerWidth;
                    filtrar();
                }
            });

            window.onload = () => render(productos);

            // Registro del Service Worker para Offline
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js')
                        .then(reg => console.log('Service Worker activo.', reg.scope))
                        .catch(err => console.error('Error de SW:', err));
                });
            }
        </script>
    </body>
</html>
